db.default.driver=com.microsoft.sqlserver.jdbc.SQLServerDriver
db.default.url="jdbc:sqlserver://127.0.0.1:1433;databaseName=ScalaTodoPlayAppDb;encrypt=true;trustServerCertificate=true"
db.default.username="sa"
db.default.password="123456"

# DB bağlantı ayarları
play.db.prototype.hikari.connectionTimeout = 15000
play.db.prototype.hikari.validationTimeout = 5000

# Evolutions
play.evolutions.db.default.autoApply=true

# CSRF
play.filters.enabled += "play.filters.csrf.CSRFFilter"
play.filters.csrf {
  header.name = "Csrf-Token"
  cookie.name = "PLAY_CSRF_TOKEN"
}

# Session
play.http.session.secure = false
play.http.session.httpOnly = true
play.http.session.sameSite = "lax"
play.http.session.cookieName = "TODO_SESSION"

# Logging (debug kolaylığı için)
logger.root = INFO
logger.play = WARN

# Server
play.server.http.idleTimeout = 60s

# Error Handler
play.http.errorHandler = "ErrorHandler"

# Google OAuth2
google.oauth {
  clientId = ${?GOOGLE_CLIENT_ID}
  clientSecret = ${?GOOGLE_CLIENT_SECRET}
  callbackUrl = "http://localhost:9000/auth/google/callback"
  authUrl = "https://accounts.google.com/o/oauth2/v2/auth"
  tokenUrl = "https://oauth2.googleapis.com/token"
  userInfoUrl = "https://www.googleapis.com/oauth2/v2/userinfo"
}

# Microsoft Azure AD OAuth2
microsoft.oauth {
  clientId = ${?MICROSOFT_CLIENT_ID}
  clientSecret = ${?MICROSOFT_CLIENT_SECRET}
  callbackUrl = "http://localhost:9000/auth/microsoft/callback"
  authUrl = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
  tokenUrl = "https://login.microsoftonline.com/common/oauth2/v2.0/token"
  userInfoUrl = "https://graph.microsoft.com/v1.0/me"
}